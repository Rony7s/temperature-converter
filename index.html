<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Temperature Converter</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<div class="container">

		<header>
			<img src="img/thermometer.png" alt="Thermometer Icon" class="icon" />
			<h1>Temperature Converter</h1>
			<p class="subtitle">Celsius ↔ Fahrenheit ↔ Kelvin</p>
		</header>

		<section class="card" aria-label="Temperature converter inputs">

			<label for="celsius">Celsius (°C)</label>
			<input id="celsius" type="number" placeholder="Enter Celsius" aria-label="Celsius input">

			<label for="fahrenheit">Fahrenheit (°F)</label>
			<input id="fahrenheit" type="number" placeholder="Enter Fahrenheit" aria-label="Fahrenheit input">

			<label for="kelvin">Kelvin (K)</label>
			<input id="kelvin" type="number" placeholder="Enter Kelvin" aria-label="Kelvin input">

		</section>

		<footer>
			<p>Developed by <a class="fbLink" href="https://facebook.com/EdTech.Engg" target="_blank">Rony Ahmmed EdTE-UFTB</a></p>
		</footer>

	</div>

	<script src="script.js"></script>
</body>

</html>
